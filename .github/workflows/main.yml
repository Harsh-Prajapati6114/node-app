name: node-app

on: push

jobs:
  build: 
    runs-on: ubuntu-latest
    steps:

      - name: checkout code
        uses: actions/checkout@v4
        
      - name: install dependecies
        run:  npm install

      - name: install Docker
        run: sudo apt update && sudo apt install docker.io -y && sudo usermod -aG docker $user && docker --version
